version: "3.9"

services:
  api:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mongo
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A sop worker -Q sop.scrape,sop.webhook -c 4 --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mongo
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: sop
      POSTGRES_USER: sop
      POSTGRES_PASSWORD: sop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
  
  mock-scraper:
    build: ./mock_scraper
    ports:
      - "9000:9000"
    depends_on:
      - api
      

volumes:
  postgres_data:
  redis_data:
  mongo_data: